# Zsh 插件配置
# 格式: PLUGIN_NAME|GITHUB_REPO|GITEE_REPO|DESCRIPTION

# 官方插件 (Oh My Zsh 内置)
git|builtin|builtin|Git 别名和补全
sudo|builtin|builtin|按两次 ESC 在命令前添加 sudo
dotenv|builtin|builtin|自动加载 .env 文件
web-search|builtin|builtin|命令行搜索引擎
jsontools|builtin|builtin|JSON 格式化工具
copypath|builtin|builtin|复制当前路径到剪贴板
copyfile|builtin|builtin|复制文件内容到剪贴板
copybuffer|builtin|builtin|复制当前命令行到剪贴板
dirhistory|builtin|builtin|目录历史导航
history|builtin|builtin|历史命令别名
colored-man-pages|builtin|builtin|彩色 man 手册
colorize|builtin|builtin|语法高亮 cat
ubuntu|builtin|builtin|Ubuntu/Debian 别名
debian|builtin|builtin|Debian 别名

# 第三方插件
zsh-autosuggestions|zsh-users/zsh-autosuggestions|zsh-users/zsh-autosuggestions|命令自动建议
zsh-syntax-highlighting|zsh-users/zsh-syntax-highlighting|zsh-users/zsh-syntax-highlighting|命令语法高亮
zsh-completions|zsh-users/zsh-completions|zsh-users/zsh-completions|扩展命令补全
zsh-autopair|hlissner/zsh-autopair|hlissner/zsh-autopair|括号自动配对
zsh-history-substring-search|zsh-users/zsh-history-substring-search|zsh-users/zsh-history-substring-search|历史命令子串搜索

# 主题
powerlevel10k|romkatv/powerlevel10k|romkatv/powerlevel10k|高度可定制的 Zsh 主题
