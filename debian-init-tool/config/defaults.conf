# Debian Init Tool 默认配置文件
# 格式: KEY=VALUE (shell 格式)

# === 代理配置 ===
PROXY_HOST=""
PROXY_PORT="7890"
PROXY_TYPE="http"

# === APT 镜像源 ===
# 可选: aliyun, tsinghua, ustc, huawei, tencent
DEFAULT_MIRROR="aliyun"

# === Locale 设置 ===
DEFAULT_LOCALE="en_US.UTF-8"
LOCALES_TO_GENERATE="en_US.UTF-8 zh_CN.UTF-8"

# === 时区设置 ===
DEFAULT_TIMEZONE="Asia/Shanghai"
DEFAULT_NTP_SERVER="cn.pool.ntp.org"

# === SSH 配置 ===
DEFAULT_SSH_PORT="59981"
SSH_PERMIT_ROOT_LOGIN="prohibit-password"
SSH_PASSWORD_AUTH="yes"

# === 防火墙配置 ===
DEFAULT_FIREWALL="ufw"

# === Fail2ban 配置 ===
FAIL2BAN_MAX_RETRY="3"
FAIL2BAN_FIND_TIME="600"
FAIL2BAN_BAN_TIME="3600"

# === 备份配置 ===
BACKUP_ROOT="/var/backups/debian-init-tool"
MAX_BACKUPS="5"

# === 日志配置 ===
LOG_LEVEL="INFO"
LOG_FILE="/var/log/debian-init-tool.log"

# === Zsh 配置 ===
DEFAULT_ZSH_THEME="powerlevel10k/powerlevel10k"
DEFAULT_ZSH_PLUGINS="git zsh-autosuggestions zsh-syntax-highlighting"

# === Docker 配置 ===
DOCKER_REGISTRY_MIRROR="https://hub-mirror.c.163.com"
